<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>Babylon 4D</title>
  <link rel="stylesheet" href="../css/index.css">

  <script src="https://preview.babylonjs.com/babylon.js"></script>
  <script src="https://preview.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
</head>
<body>

  <div id="container">
    <canvas id="renderCanvas3D"></canvas>

    <!-- Colonne des projections 2D -->
    <div id="sidebar-2d">
    </div>
  </div>

  <div id="ui-controls">
    <!-- Rotations 4D : plans -->
    <div class="panel" id="rotation-panel">
      <span class="label">Rotations 4D :</span>
      <button id="btn-rotation-xy">Rotation XY</button>
      <button id="btn-rotation-xz">Rotation XZ</button>
      <button id="btn-rotation-xw">Rotation XW</button>
      <button id="btn-rotation-yz">Rotation YZ</button>
      <button id="btn-rotation-yw">Rotation YW</button>
      <button id="btn-rotation-zw">Rotation ZW</button>
    </div>

    <!-- Translation 4D -->
    <div class="panel" id="translation-panel">
      <span class="label">Translation :</span>
      <div class="axis"><span>X</span><button id="tx-minus">-</button><button id="tx-plus">+</button></div>
      <div class="axis"><span>Y</span><button id="ty-minus">-</button><button id="ty-plus">+</button></div>
      <div class="axis"><span>Z</span><button id="tz-minus">-</button><button id="tz-plus">+</button></div>
      <div class="axis"><span>W</span><button id="tw-minus">-</button><button id="tw-plus">+</button></div>
    </div>

    <!-- Homothétie -->
    <div class="panel" id="homothetie-panel">
      <span class="label">Homothétie :</span>
      <div class="axis">
        <button id="homothetie-minus">-</button>
        <button id="homothetie-plus">+</button>
      </div>
    </div>

    <!-- Affichage -->
    <button id="btn-faces-toggle">Afficher les faces</button>
    <button id="btn-wire-toggle">Afficher fil de fer</button>
  </div>

  <script src="../js/main4D.js" type="module"></script>
  <script src="../js/controls4D.js" type="module"></script>
</body>
</html>
